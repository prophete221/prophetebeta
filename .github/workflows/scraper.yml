name: Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxi6 libxtst6 libnss3 libcups2 libxrandr2 \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libpangocairo-1.0-0 libgtk-3-0 libgbm1 \
            libxshmfence1 libx11-6 libx11-dev libxext6

      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'false'

      - name: Run scraper (web scraping — no API key)
        run: node scripts/scraper.js
        env:
          NODE_ENV: production
          PUPPETEER_EXECUTABLE_PATH: ''

      - name: Commit updated data
        run: |
          git config --local user.email "bot@bttsbet.online"
          git config --local user.name "BttsBet Bot"
          git add public/predictions.json public/win-history.json
          git diff --staged --quiet || git commit -m "chore: update daily predictions & win history [skip ci]"
          git push
