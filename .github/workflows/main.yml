name: Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/predictions.json'
      - 'public/win-history.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Run scraper (generate latest predictions with real dates)
        run: node scripts/scraper.js
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Build Next.js static export
        run: npm run build

      - name: Commit and push updated prediction data
        run: |
          git config --local user.email "bot@bttsbet.online"
          git config --local user.name "BttsBet Bot"
          git add public/predictions.json public/win-history.json public/predictions-archive/
          git diff --staged --quiet || git commit -m "chore: update predictions with real dates [skip ci]"
          git push || echo "Git push skipped"

      - name: Deploy to server via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/node_modules/**
